

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#9FE1CB;
  --amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
}
body{font-family:'Syne',sans-serif;background:var(--color-background-secondary);color:var(--color-text-primary);padding:0;}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem;}
.header{display:flex;align-items:center;gap:14px;margin-bottom:2rem;}
.logo{width:42px;height:42px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header h1{font-size:20px;font-weight:500;}
.header p{font-size:12px;color:var(--color-text-secondary);margin-top:3px;font-family:monospace;}
.input-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.input-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.8px;font-family:monospace;margin-bottom:10px;}
.input-row{display:flex;gap:10px;flex-wrap:wrap;}
.input-row input{flex:1;min-width:180px;height:42px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 12px;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;transition:border 0.15s;}
.input-row input:focus{border-color:var(--green);}
.btn-analyze{height:42px;padding:0 20px;background:var(--green);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.btn-analyze:hover{background:var(--green-dark);}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-family:monospace;transition:all 0.15s;}
.tag:hover{border-color:var(--green);color:var(--green-dark);background:var(--green-light);}
.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.result-header{padding:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.category-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;font-family:monospace;background:var(--green-light);color:var(--green-dark);border:0.5px solid var(--green-mid);margin-bottom:8px;}
.result-title{font-size:18px;font-weight:500;}
.result-subtitle{font-size:13px;color:var(--color-text-secondary);margin-top:4px;}
.result-body{padding:1.25rem;}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center;}
.metric-val{font-size:20px;font-weight:500;font-family:monospace;}
.metric-val.green{color:var(--green);}
.metric-val.amber{color:var(--amber);}
.metric-val.red{color:var(--red);}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.8px;text-transform:uppercase;font-family:monospace;margin-bottom:8px;}
.hazard-bar{height:6px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin-bottom:1.25rem;}
.hazard-fill{height:100%;border-radius:4px;}
.benefits-list{list-style:none;margin-bottom:1.25rem;}
.benefits-list li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:14px;line-height:1.6;}
.benefits-list li:last-child{border-bottom:none;}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;margin-top:6px;}
.disposition-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.25rem;}
.disp-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;}
.disp-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;margin-bottom:8px;}
.disp-icon.recycle{background:#E1F5EE;color:#0F6E56;}
.disp-icon.donate{background:#E6F1FB;color:#185FA5;}
.disp-icon.store{background:#FAEEDA;color:#854F0B;}
.disp-icon.hazard{background:#FCEBEB;color:#A32D2D;}
.disp-title{font-size:13px;font-weight:500;margin-bottom:4px;}
.disp-text{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.footer-note{font-size:12px;color:var(--color-text-secondary);font-family:monospace;text-align:center;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary);}

/* --- MARKETPLACE SECTION --- */
.market-section{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1.25rem;}
.market-header{display:flex;gap:0;}
.market-tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:none;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all 0.15s;border-bottom:0.5px solid var(--color-border-tertiary);}
.market-tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-bottom:2px solid var(--green);}
.market-tab:first-child{border-right:0.5px solid var(--color-border-tertiary);}
.market-body{padding:1rem;}
.price-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:monospace;padding:3px 9px;border-radius:20px;}
.price-badge.good{background:var(--green-light);color:var(--green-dark);}
.price-badge.mid{background:var(--amber-light);color:var(--amber);}
.price-badge.low{background:#FCEBEB;color:#A32D2D;}
.market-price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.price-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center;}
.price-card-label{font-size:11px;color:var(--color-text-secondary);font-family:monospace;margin-bottom:4px;}
.price-card-val{font-size:17px;font-weight:500;font-family:monospace;color:var(--green);}
.cond-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.cond-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-family:monospace;transition:all 0.15s;}
.cond-btn.active{background:var(--green-light);border-color:var(--green-mid);color:var(--green-dark);}
.listing-form{display:flex;flex-direction:column;gap:10px;}
.listing-form input,.listing-form textarea,.listing-form select{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;transition:border 0.15s;font-family:inherit;}
.listing-form input:focus,.listing-form textarea:focus,.listing-form select:focus{border-color:var(--green);}
.listing-form textarea{resize:vertical;min-height:64px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-post{height:40px;padding:0 20px;background:var(--green);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:background 0.15s;}
.btn-post:hover{background:var(--green-dark);}
.btn-post.buy-btn{background:var(--blue);}
.btn-post.buy-btn:hover{background:#0C447C;}
.listings-grid{display:flex;flex-direction:column;gap:10px;}
.listing-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;display:flex;gap:12px;align-items:flex-start;}
.listing-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.listing-info{flex:1;min-width:0;}
.listing-title{font-size:14px;font-weight:500;margin-bottom:2px;}
.listing-meta{font-size:12px;color:var(--color-text-secondary);font-family:monospace;}
.listing-price{font-size:16px;font-weight:500;font-family:monospace;color:var(--green);flex-shrink:0;}
.listing-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.listing-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-family:monospace;}
.listing-tag.cond-good{background:var(--green-light);color:var(--green-dark);}
.listing-tag.cond-fair{background:var(--amber-light);color:var(--amber);}
.listing-tag.cond-poor{background:#FCEBEB;color:#A32D2D);}
.listing-tag.loc{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
.success-toast{background:var(--green-light);border:0.5px solid var(--green-mid);border-radius:var(--border-radius-md);padding:12px 16px;font-size:13px;color:var(--green-dark);margin-bottom:1rem;display:none;}
.market-tip{font-size:12px;color:var(--color-text-secondary);font-family:monospace;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);line-height:1.6;}
.want-form{display:flex;flex-direction:column;gap:10px;}
.want-form input,.want-form select{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;transition:border 0.15s;font-family:inherit;}
.want-form input:focus,.want-form select:focus{border-color:var(--blue);}
.want-listings{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;}
.want-card{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px;display:flex;gap:10px;align-items:center;}
.want-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;background:var(--blue-light);color:var(--blue);}
.want-info{flex:1;}
.want-title{font-size:13px;font-weight:500;}
.want-meta{font-size:12px;color:var(--color-text-secondary);font-family:monospace;}
.want-budget{font-size:14px;font-weight:500;color:var(--blue);font-family:monospace;}
</style>

</div>

const FALLBACK = {
  itemName:'Unknown Electronic Item',category:'Other',hazardLevel:5,hazardColor:'amber',
  recyclabilityScore:'~60%',estimatedLifespan:'Unknown',estimatedRecovery:'Varies by component',
  marketData:{sellRange:['₹200','₹1,500','₹5,000'],tipSell:'Describe the item clearly and list any visible damage. Include original accessories for better value.',tipBuy:'Ask for photos, a working demo, and any known faults before buying.',canSell:true},
  sampleListings:[],wantedListings:[],
  benefits:['Even unidentified electronics often contain recoverable metals including copper, steel, and precious metals.','Keeping any electronic device out of general waste prevents toxic leaching.','Certified e-waste recyclers can safely assess and process unfamiliar devices.','When in doubt, a local council WEEE collection point is always a safe starting point.'],
  dispositionOptions:[{type:'recycle',title:'Recycle',description:'Take to your nearest council WEEE drop-off or certified e-waste recycler.'},{type:'donate',title:'Donate / Reuse',description:'If the device works, try a local repair cafe, charity shop, or freecycle group.'},{type:'store',title:'Safe Storage',description:'Store in a dry, cool place away from children.'},{type:'hazard',title:'Hazard Note',description:'Most electronics contain some hazardous materials. Always prefer certified recyclers.'}],
  footerNote:'If you cannot identify the item, your local council waste line can usually advise on correct disposal.'
};

const icons = {
  recycle:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
  donate:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  store:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`,
  hazard:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
};

const condMap = {Good:{cls:'cond-good',label:'Good'},Fair:{cls:'cond-fair',label:'Fair'},Parts:{cls:'cond-fair',label:'For parts'}};

let activeCond = 'Good';
let activeMarketTab = 'sell';
let currentItem = null;

function fill(val){document.getElementById('wasteInput').value=val;classify();}

function findItem(query){
  const q=query.toLowerCase();
  for(const item of DB){
    if(item.keywords.some(k=>q.includes(k)||k.includes(q)))return item;
  }
  return null;
}

function classify(){
  const input=document.getElementById('wasteInput').value.trim();
  if(!input)return;
  const result=findItem(input)||{...FALLBACK,itemName:input.charAt(0).toUpperCase()+input.slice(1)+' (General)'};
  currentItem = result;
  render(result);
}

function switchMarketTab(tab){
  activeMarketTab = tab;
  document.querySelectorAll('.market-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.getElementById('marketSell').style.display = tab==='sell'?'block':'none';
  document.getElementById('marketBuy').style.display = tab==='buy'?'block':'none';
}

function setCond(c){
  activeCond = c;
  document.querySelectorAll('.cond-btn').forEach(b=>b.classList.toggle('active',b.dataset.cond===c));
}

function postListing(){
  const title = document.getElementById('listTitle').value.trim();
  const price = document.getElementById('listPrice').value.trim();
  if(!title||!price){alert('Please fill in at least a title and asking price.');return;}
  const toast = document.getElementById('sellToast');
  toast.style.display='block';
  toast.textContent = `✓ Listing posted: "${title}" at ${price} — buyers in your area will be notified.`;
  document.getElementById('listTitle').value='';
  document.getElementById('listPrice').value='';
  document.getElementById('listNotes').value='';
  setTimeout(()=>{toast.style.display='none';},5000);
}

function postWant(){
  const item = document.getElementById('wantItem').value.trim();
  const budget = document.getElementById('wantBudget').value.trim();
  if(!item||!budget){alert('Please fill in the item and your budget.');return;}
  const toast = document.getElementById('buyToast');
  toast.style.display='block';
  toast.textContent = `✓ Buy request posted for "${item}" with budget ${budget} — sellers will reach out.`;
  document.getElementById('wantItem').value='';
  document.getElementById('wantBudget').value='';
  setTimeout(()=>{toast.style.display='none';},5000);
}

function render(r){
  const colors={green:'#1D9E75',amber:'#BA7517',red:'#A32D2D'};
  const fill=colors[r.hazardColor]||colors.amber;
  const pct=(r.hazardLevel/10)*100;
  const mc=r.hazardColor==='green'?'green':r.hazardColor==='red'?'red':'amber';
  const benefits=r.benefits.map(b=>`<li><span class="dot"></span><span>${b}</span></li>`).join('');
  const disp=r.dispositionOptions.map(d=>`<div class="disp-card"><div class="disp-icon ${d.type}">${icons[d.type]||icons.store}</div><div class="disp-title">${d.title}</div><div class="disp-text">${d.description}</div></div>`).join('');

  const md = r.marketData;
  let marketHTML = '';

  if(!md.canSell){
    marketHTML = `
    <div class="market-section">
      <div style="padding:1.25rem;display:flex;gap:12px;align-items:flex-start;">
        <div style="width:36px;height:36px;background:#FCEBEB;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A32D2D" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div>
          <div style="font-size:13px;font-weight:500;color:#A32D2D;margin-bottom:4px;">Not suitable for resale</div>
          <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;">${md.noSellReason}</div>
        </div>
      </div>
    </div>`;
  } else {
    const priceRow = md.sellRange ? `
    <div class="market-price-row">
      <div class="price-card"><div class="price-card-label">Low end</div><div class="price-card-val" style="color:#A32D2D;">${md.sellRange[0]}</div></div>
      <div class="price-card"><div class="price-card-label">Typical</div><div class="price-card-val">${md.sellRange[1]}</div></div>
      <div class="price-card"><div class="price-card-label">High end</div><div class="price-card-val" style="color:#0F6E56;">${md.sellRange[2]}</div></div>
    </div>` : '';

    const sellListings = r.sampleListings.length ? r.sampleListings.map(l=>`
      <div class="listing-card">
        <div class="listing-avatar" style="background:${l.color};color:${l.textColor};">${l.avatar}</div>
        <div class="listing-info">
          <div class="listing-title">${l.item}</div>
          <div class="listing-meta">${l.name}</div>
          <div class="listing-tags">
            <span class="listing-tag ${condMap[l.cond]?.cls||'cond-fair'}">${l.cond}</span>
            <span class="listing-tag loc">${l.loc}</span>
          </div>
        </div>
        <div class="listing-price">${l.price}</div>
      </div>`).join('') : '<div style="font-size:13px;color:var(--color-text-secondary);padding:8px 0;">No active listings yet — be the first to sell!</div>';

    const wantListings = r.wantedListings.length ? r.wantedListings.map(w=>`
      <div class="want-card">
        <div class="want-avatar">${w.avatar}</div>
        <div class="want-info">
          <div class="want-title">${w.item}</div>
          <div class="want-meta">${w.name} · ${w.loc}</div>
        </div>
        <div class="want-budget">${w.budget}</div>
      </div>`).join('') : '<div style="font-size:13px;color:var(--color-text-secondary);padding:8px 0;">No buyers listed yet.</div>';

    marketHTML = `
    <div class="market-section">
      <div class="market-header">
        <button class="market-tab active" data-tab="sell" onclick="switchMarketTab('sell')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px;vertical-align:-2px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Sell your item
        </button>
        <button class="market-tab" data-tab="buy" onclick="switchMarketTab('buy')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px;vertical-align:-2px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Buy / Request
        </button>
      </div>

      <div id="marketSell" class="market-body">
        <div class="section-title" style="margin-bottom:10px;">Estimated resale value</div>
        ${priceRow}
        <div class="section-title" style="margin-bottom:8px;">Active listings nearby</div>
        <div class="listings-grid" style="margin-bottom:1rem;">${sellListings}</div>
        <div class="section-title" style="margin-bottom:8px;">Post your listing</div>
        <div id="sellToast" class="success-toast"></div>
        <div class="cond-select">
          <span>Condition:</span>
          <button class="cond-btn active" data-cond="Good" onclick="setCond('Good')">Good</button>
          <button class="cond-btn" data-cond="Fair" onclick="setCond('Fair')">Fair</button>
          <button class="cond-btn" data-cond="Parts" onclick="setCond('Parts')">For parts</button>
        </div>
        <div class="listing-form">
          <input type="text" id="listTitle" placeholder="Item title e.g. Samsung Galaxy S21, 128GB" />
          <div class="form-row">
            <input type="text" id="listPrice" placeholder="Asking price e.g. ₹8,500" />
            <input type="text" id="listLocation" placeholder="Your city" />
          </div>
          <textarea id="listNotes" placeholder="Any notes about condition, included accessories, known faults…"></textarea>
          <button class="btn-post" onclick="postListing()">Post listing ↗</button>
        </div>
        <div class="market-tip" style="margin-top:10px;">
          <strong>Seller tip:</strong> ${md.tipSell}
        </div>
      </div>

      <div id="marketBuy" class="market-body" style="display:none;">
        <div class="section-title" style="margin-bottom:8px;">People looking to buy</div>
        <div class="want-listings">${wantListings}</div>
        <div class="section-title" style="margin-bottom:8px;">Post a buy request</div>
        <div id="buyToast" class="success-toast"></div>
        <div class="want-form">
          <input type="text" id="wantItem" placeholder="What are you looking for? e.g. iPhone 12, any colour" />
          <div class="form-row">
            <input type="text" id="wantBudget" placeholder="Your budget e.g. ₹12,000" />
            <input type="text" id="wantCity" placeholder="Your city" />
          </div>
          <button class="btn-post buy-btn" onclick="postWant()">Post buy request ↗</button>
        </div>
        <div class="market-tip" style="margin-top:10px;">
          <strong>Buyer tip:</strong> ${md.tipBuy}
        </div>
      </div>
    </div>`;
  }

  document.getElementById('resultArea').innerHTML=`
  <div class="result-card">
    <div class="result-header">
      <span class="category-badge">${r.category}</span>
      <div class="result-title">${r.itemName}</div>
      <div class="result-subtitle">Estimated lifespan: ${r.estimatedLifespan}</div>
    </div>
    <div class="result-body">
      <div class="metrics-row">
        <div class="metric"><div class="metric-val ${mc}">${r.hazardLevel}/10</div><div class="metric-label">hazard level</div></div>
        <div class="metric"><div class="metric-val green">${r.recyclabilityScore}</div><div class="metric-label">recyclable</div></div>
        <div class="metric"><div class="metric-val" style="font-size:13px;padding-top:5px;">${r.estimatedRecovery}</div><div class="metric-label">recoverable materials</div></div>
      </div>
      <div class="section-title">Hazard rating</div>
      <div class="hazard-bar"><div class="hazard-fill" style="width:${pct}%;background:${fill};"></div></div>

      <div class="section-title">Buy · Sell marketplace</div>
      ${marketHTML}

      <div class="section-title">Benefits of proper disposal</div>
      <ul class="benefits-list">${benefits}</ul>
      <div class="section-title">Disposition options</div>
      <div class="disposition-grid">${disp}</div>
      <div class="footer-note">${r.footerNote}</div>
    </div>
  </div>`;

  activeMarketTab = 'sell';
}

document.getElementById('wasteInput').addEventListener('keydown',e=>{if(e.key==='Enter')classify();});
</script>
