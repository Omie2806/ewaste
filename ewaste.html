*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#9FE1CB;
  --amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;
}
body{font-family:'Syne',sans-serif;background:var(--color-background-secondary);color:var(--color-text-primary);padding:1.5rem 1rem;}
.app{max-width:860px;margin:0 auto;}
.header{display:flex;align-items:center;gap:14px;margin-bottom:2rem;}
.logo{width:42px;height:42px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header h1{font-size:20px;font-weight:500;}
.header p{font-size:12px;color:var(--color-text-secondary);margin-top:3px;font-family:monospace;}
.input-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
.input-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.8px;font-family:monospace;margin-bottom:10px;}
.input-row{display:flex;gap:10px;flex-wrap:wrap;}
.input-row input{flex:1;min-width:180px;height:42px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 12px;font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;transition:border 0.15s;}
.input-row input:focus{border-color:var(--green);}
.btn-analyze{height:42px;padding:0 20px;background:var(--green);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 0.15s;}
.btn-analyze:hover{background:var(--green-dark);}
.quick-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.tag{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-family:monospace;transition:all 0.15s;}
.tag:hover{border-color:var(--green);color:var(--green-dark);background:var(--green-light);}
.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.result-header{padding:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.category-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;font-family:monospace;background:var(--green-light);color:var(--green-dark);border:0.5px solid var(--green-mid);margin-bottom:8px;}
.result-title{font-size:18px;font-weight:500;}
.result-subtitle{font-size:13px;color:var(--color-text-secondary);margin-top:4px;}
.result-body{padding:1.25rem;}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center;}
.metric-val{font-size:20px;font-weight:500;font-family:monospace;}
.metric-val.green{color:var(--green);}
.metric-val.amber{color:var(--amber);}
.metric-val.red{color:var(--red);}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-top:4px;font-family:monospace;}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.8px;text-transform:uppercase;font-family:monospace;margin-bottom:8px;}
.hazard-bar{height:6px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin-bottom:1.25rem;}
.hazard-fill{height:100%;border-radius:4px;}
.benefits-list{list-style:none;margin-bottom:1.25rem;}
.benefits-list li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:14px;line-height:1.6;}
.benefits-list li:last-child{border-bottom:none;}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;margin-top:6px;}
.disposition-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.25rem;}
.disp-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;}
.disp-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;margin-bottom:8px;}
.disp-icon.recycle{background:#E1F5EE;color:#0F6E56;}
.disp-icon.donate{background:#E6F1FB;color:#185FA5;}
.disp-icon.store{background:#FAEEDA;color:#854F0B;}
.disp-icon.hazard{background:#FCEBEB;color:#A32D2D;}
.disp-title{font-size:13px;font-weight:500;margin-bottom:4px;}
.disp-text{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}
.footer-note{font-size:12px;color:var(--color-text-secondary);font-family:monospace;text-align:center;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary);}
.no-match{padding:2rem;text-align:center;color:var(--color-text-secondary);font-size:14px;}
</style>

function fill(val){document.getElementById('wasteInput').value=val;classify();}

function findItem(query){
  const q=query.toLowerCase();
  for(const item of DB){
    if(item.keywords.some(k=>q.includes(k)||k.includes(q)))return item;
  }
  return null;
}

function classify(){
  const input=document.getElementById('wasteInput').value.trim();
  if(!input)return;
  const result=findItem(input)||{...FALLBACK,itemName:input.charAt(0).toUpperCase()+input.slice(1)+' (General)' };
  render(result);
}

function render(r){
  const colors={green:'#1D9E75',amber:'#BA7517',red:'#A32D2D'};
  const fill=colors[r.hazardColor]||colors.amber;
  const pct=(r.hazardLevel/10)*100;
  const mc=r.hazardColor==='green'?'green':r.hazardColor==='red'?'red':'amber';
  const benefits=r.benefits.map(b=>`<li><span class="dot"></span><span>${b}</span></li>`).join('');
  const disp=r.dispositionOptions.map(d=>`<div class="disp-card"><div class="disp-icon ${d.type}">${icons[d.type]||icons.store}</div><div class="disp-title">${d.title}</div><div class="disp-text">${d.description}</div></div>`).join('');
  document.getElementById('resultArea').innerHTML=`
  <div class="result-card">
    <div class="result-header">
      <span class="category-badge">${r.category}</span>
      <div class="result-title">${r.itemName}</div>
      <div class="result-subtitle">Estimated lifespan: ${r.estimatedLifespan}</div>
    </div>
    <div class="result-body">
      <div class="metrics-row">
        <div class="metric"><div class="metric-val ${mc}">${r.hazardLevel}/10</div><div class="metric-label">hazard level</div></div>
        <div class="metric"><div class="metric-val green">${r.recyclabilityScore}</div><div class="metric-label">recyclable</div></div>
        <div class="metric"><div class="metric-val" style="font-size:13px;padding-top:5px;">${r.estimatedRecovery}</div><div class="metric-label">recoverable materials</div></div>
      </div>
      <div class="section-title">Hazard rating</div>
      <div class="hazard-bar"><div class="hazard-fill" style="width:${pct}%;background:${fill};"></div></div>
      <div class="section-title">Benefits of proper disposal</div>
      <ul class="benefits-list">${benefits}</ul>
      <div class="section-title">Disposition options</div>
      <div class="disposition-grid">${disp}</div>
      <div class="footer-note">${r.footerNote}</div>
    </div>
  </div>`;
}

document.getElementById('wasteInput').addEventListener('keydown',e=>{if(e.key==='Enter')classify();});
</script>
